# OrderFlow CI — lint, typecheck, unit tests, optional image build.
# Honesty: this lab CI does not deploy to production or apply Terraform.
#
# Action pins: full commit SHAs with version comments. Re-verify SHAs from
# the upstream repos before treating this as a production-grade supply-chain bar.
# Prefer Dependabot/Renovate to refresh pins intentionally.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check packages apps tests scripts

      - name: Mypy
        run: python -m mypy packages/orderflow_common/orderflow_common apps/incident-assistant/incident_assistant

      - name: Pytest
        run: python -m pytest -q

      # Placeholder: production pipelines should add Trivy FS/image scans and SBOM
      # upload here or in supply-chain.yml. Kept separate so unit CI stays fast.
      # - name: Trivy filesystem (placeholder)
      #   uses: aquasecurity/trivy-action@<FULL_SHA> # pin before enabling
      # - name: SBOM (placeholder)
      #   uses: anchore/sbom-action@<FULL_SHA> # pin before enabling

  docker-order-api:
    name: docker-build-order-api
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build order-api image (optional / best-effort)
        # Docker is available on GitHub-hosted runners; continue-on-error keeps
        # PR feedback green if the daemon is unavailable in a self-hosted fork.
        continue-on-error: true
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not available; skipping image build (lab CI)."
            exit 0
          fi
          docker build -f apps/order-api/Dockerfile -t orderflow/order-api:ci "${GITHUB_WORKSPACE}"
