apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orderflow-prod-like
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/environment: prod-like
    orderflow.lab/purpose: local-reliability-lab
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: orderflow
  source:
    # Replace with your git remote when wiring a real Argo CD instance.
    repoURL: https://github.com/example/orderflow.git
    targetRevision: HEAD
    path: deploy/kustomize/overlays/prod-like
  destination:
    server: https://kubernetes.default.svc
    namespace: orderflow
  # No automated sync — human owns promote/rollback authority for prod-like lab demos.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 20
