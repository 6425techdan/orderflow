apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: orderflow
  labels:
    app.kubernetes.io/name: order-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
