# LAB-ONLY: single-pod Postgres for the local reliability lab.
# Do NOT use this shape for real production data (no HA, no backups, weak credentials).
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-lab
  namespace: orderflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
    orderflow.lab/tier: lab-only
    orderflow.lab/warning: single-pod-no-ha-no-backups
data:
  POSTGRES_DB: orderflow
  POSTGRES_USER: orderflow
---
# Lab credentials only — never reuse outside the local kind/demo cluster.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-lab
  namespace: orderflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
    orderflow.lab/tier: lab-only
type: Opaque
stringData:
  POSTGRES_PASSWORD: orderflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: orderflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
    orderflow.lab/tier: lab-only
    orderflow.lab/warning: single-pod-no-ha-no-backups
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: orderflow
        orderflow.lab/purpose: local-reliability-lab
        orderflow.lab/tier: lab-only
    spec:
      terminationGracePeriodSeconds: 30
      # Official postgres image runs as uid 999 (postgres).
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: postgres-lab
            - secretRef:
                name: postgres-lab
          env:
            # emptyDir mount root cannot be chmod'd by uid 999 on kind; use a subdirectory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "orderflow", "-d", "orderflow"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "orderflow", "-d", "orderflow"]
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: orderflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
    orderflow.lab/tier: lab-only
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
