apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-mock
  namespace: orderflow
  labels:
    app.kubernetes.io/name: payment-mock
    app.kubernetes.io/component: dependency-mock
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-mock
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-mock
        app.kubernetes.io/component: dependency-mock
        app.kubernetes.io/part-of: orderflow
        orderflow.lab/purpose: local-reliability-lab
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: payment-mock
      containers:
        - name: payment-mock
          image: orderflow/payment-mock:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: payment-mock
            - name: DEPLOY_ENV
              value: lab
            - name: OTEL_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 20
            periodSeconds: 2
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-mock
  namespace: orderflow
  labels:
    app.kubernetes.io/name: payment-mock
    app.kubernetes.io/component: dependency-mock
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payment-mock
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP
