apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-worker
  namespace: orderflow
  labels:
    app.kubernetes.io/name: order-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: orderflow
    orderflow.lab/purpose: local-reliability-lab
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: order-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: orderflow
        orderflow.lab/purpose: local-reliability-lab
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: order-worker
      containers:
        - name: order-worker
          image: orderflow/order-worker:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: order-worker
            - name: DEPLOY_ENV
              value: lab
            - name: OTEL_ENABLED
              value: "false"
            - name: DATABASE_URL
              value: postgresql://orderflow:orderflow@postgres:5432/orderflow
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: PAYMENT_URL
              value: http://payment-mock:8082
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          # Worker has no HTTP server; process-alive probes keep the lab production-shaped.
          startupProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
