global:
  scrape_interval: 10s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: order-api
    metrics_path: /metrics
    static_configs:
      - targets: ["order-api:8080"]
  - job_name: order-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["order-worker:8081"]
  - job_name: payment-mock
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-mock:8082"]
  - job_name: incident-assistant
    metrics_path: /metrics
    static_configs:
      - targets: ["incident-assistant:8083"]
