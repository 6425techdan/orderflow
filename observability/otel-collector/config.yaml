receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: order-api
          scrape_interval: 10s
          static_configs:
            - targets: ["order-api:8080"]
        - job_name: payment-mock
          scrape_interval: 15s
          static_configs:
            - targets: ["payment-mock:8082"]

processors:
  batch: {}
  resource:
    attributes:
      - key: lab.name
        value: orderflow
        action: upsert

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheus, debug]
